<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ações 2025 — Vale, Itaú e BB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-5">Painel de Ações 2025</span>
    <a href="/atualizar" class="btn btn-outline-light btn-sm" onclick="this.textContent='Atualizando...'; fetch('/atualizar').then(()=>location.reload())">
      Atualizar dados
    </a>
  </nav>

  <main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center py-3 text-muted small">
    Dados via Yahoo Finance · Atualização automática a cada 1h
  </footer>
</body>
</html>
